<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب سارة أبو العلا - النظام المالي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;
--card:#181c27;--card2:#1e2333;
--border:#2a3045;--border2:#3a4560;
--text:#e8e4d9;--text2:#9aa5c0;--text3:#6b7591;
--primary:#0d7377;--primary2:#14919a;
--gold:#c9a84c;--gold2:#e8c46a;
--red:#e53935;--green:#4caf50;--blue:#2196f3;--orange:#ff9800;
--sidebar:260px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh;direction:rtl}
.app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;right:0;top:0;z-index:100;overflow-y:auto;transition:.3s}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-logo img{width:44px;height:44px;border-radius:10px}
.sidebar-logo-text h2{font-size:14px;font-weight:700;color:var(--gold)}
.sidebar-logo-text p{font-size:11px;color:var(--text3)}
.sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.user-info p{font-size:13px;font-weight:600}
.user-info span{font-size:11px;color:var(--text3)}
.sidebar-nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:.2s;border-radius:8px;margin:2px 8px;font-size:13px;color:var(--text2)}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}
/* MAIN */
.main{margin-right:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;color:var(--gold)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.content{padding:24px;flex:1}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px}
.kpi-label{font-size:12px;color:var(--text3);margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:700;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-gold{background:var(--gold);color:#1a1200;font-weight:700}
.btn-sm{padding:5px 10px;font-size:12px}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:10px 12px;text-align:right;font-size:12px;color:var(--text3);font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-top:1px solid var(--border);font-size:13px;color:var(--text);white-space:nowrap}
tr:hover td{background:var(--bg3)}
/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;color:var(--text3);font-weight:600}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:.2s;width:100%;direction:rtl}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group select option{background:var(--bg2)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--gold)}
/* BADGES */
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#1b3a1e;color:#4caf50}
.badge-red{background:#3a1b1b;color:#e53935}
.badge-blue{background:#1b2a3a;color:#2196f3}
.badge-gold{background:#3a2e0d;color:#c9a84c}
.badge-gray{background:var(--bg3);color:var(--text3)}
/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--primary)}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#0d2b2c 0%,var(--bg) 60%)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{width:80px;height:80px;border-radius:16px;margin-bottom:12px}
.login-logo h1{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px}
.login-logo p{font-size:13px;color:var(--text3)}
.login-btn{width:100%;margin-top:8px}
/* ALERTS */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-error{background:#3a1b1b;border:1px solid var(--red);color:#e57373}
.alert-success{background:#1b3a1e;border:1px solid var(--green);color:#81c784}
/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
/* RESPONSIVE */
@media(max-width:768px){
.sidebar{transform:translateX(100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-right:0}
.kpi-grid{grid-template-columns:repeat(2,1fr)}
}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.4}
.empty-state p{font-size:14px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:20px 0}
.text-gold{color:var(--gold)}
.text-red{color:var(--red)}
.text-green{color:var(--green)}
.text-muted{color:var(--text3)}
.fw-bold{font-weight:700}
.mb-16{margin-bottom:16px}
.gap-8{gap:8px}
.flex{display:flex}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
</style>
</head>

async function sb(table,method='GET',body=null,query=''){
  const url=`${SUPABASE_URL}/rest/v1/${table}${query}`;
  const opts={method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();
  return t?JSON.parse(t):[];
}

// ─── SCREENS ───
async function loadScreen(screen){
  setState({loading:true,error:null});
  try{
    if(screen==='home') await loadHome();
    else if(screen==='finance') await loadFinance();
    else if(screen==='clients') await loadClients();
    else if(screen==='vendors') await loadVendors();
    else if(screen==='employees') await loadEmployees();
    else if(screen==='items') await loadItems();
    else if(screen==='balance') await loadBalance();
    else if(screen==='expenses') await loadExpenses();
    else if(screen==='income') await loadIncome();
    else if(screen==='office_expenses') await loadOfficeExpenses();
    else if(screen==='office_profit') await loadOfficeProfit();
    else if(screen==='analytics') await loadAnalytics();
    else if(screen==='custody') await loadCustody();
    else if(screen==='users') await loadUsers();
  }catch(e){setState({error:e.message})}
  setState({loading:false});
}

async function loadHome(){
  const [clients,projects,employees,transactions,procurements]=await Promise.all([
    sb('clients','GET',null,'?select=*&deleted_at=is.null'),
    sb('projects','GET',null,'?select=*&deleted_at=is.null'),
    sb('employees','GET',null,'?select=*&isactive=eq.true&deleted_at=is.null'),
    sb('transactions','GET',null,'?select=*&deleted_at=is.null'),
    sb('procurements','GET',null,'?select=*&deleted_at=is.null'),
  ]);
  const revenue=transactions.filter(t=>t.type==='income'||t.type==='deposit').reduce((s,t)=>s+(+t.amount||0),0);
  const expenses=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+(+t.amount||0),0);
  setData('home',{clients,projects,employees,transactions,procurements,revenue,expenses,profit:revenue-expenses});
}

async function loadOfficeProfit(){
  const [transactions,procurements,employees]=await Promise.all([
    sb('transactions','GET',null,'?select=*&deleted_at=is.null'),
    sb('procurements','GET',null,'?select=*&deleted_at=is.null'),
    sb('employees','GET',null,'?select=*&isactive=eq.true&deleted_at=is.null'),
  ]);
  const supervision=transactions.filter(t=>t.type==='supervision').reduce((s,t)=>s+(+t.amount||0),0);
  const officeExp=transactions.filter(t=>t.type==='office_expense').reduce((s,t)=>s+(+t.amount||0),0);
  const salaries=employees.reduce((s,e)=>s+(+e.salary||0),0);
  setData('office_profit',{transactions,procurements,employees,supervision,officeExp,salaries,netProfit:supervision-officeExp-salaries});
}

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  setState({error:null,loading:true});
  try{
    if(u==='admin'&&p==='admin123'){
      const user={id:'admin_default',username:'admin',name:'مدير النظام',role:'admin'};
      localStorage.setItem('sara_user',JSON.stringify(user));
      setState({user,screen:'home',loading:false});
      await loadScreen('home');
    }else{
      const users=await sb('users','GET',null,`?select=*&username=eq.${u}&isactive=eq.true`);
      if(!users.length){setState({error:'اسم المستخدم أو كلمة المرور غير صحيحة',loading:false});return;}
      const user=users[0];
      localStorage.setItem('sara_user',JSON.stringify(user));
      setState({user,screen:'home',loading:false});
      await loadScreen('home');
    }
  }catch(e){setState({error:e.message,loading:false});}
}

// ─── ANALYTICS ───
function renderAnalytics(){
  const d=state.data.analytics||{};
  const transactions=d.transactions||[];
  const byMonth={};
  transactions.forEach(t=>{
    const m=(t.createdat||t.date||'').slice(0,7);
    if(!m)return;
    if(!byMonth[m])byMonth[m]={income:0,expense:0};
    if(t.type==='income'||t.type==='deposit')byMonth[m].income+=+t.amount||0;
    else byMonth[m].expense+=+t.amount||0;
  });
  const months=Object.keys(byMonth).sort().slice(-6);
  const maxVal=Math.max(...months.map(m=>Math.max(byMonth[m].income,byMonth[m].expense)),1);
  return`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">إجمالي العملاء</div><div class="kpi-value text-gold">${(d.clients||[]).length}</div></div>
      <div class="kpi-card"><div class="kpi-label">المشاريع</div><div class="kpi-value text-gold">${(d.projects||[]).length}</div></div>
      <div class="kpi-card"><div class="kpi-label">الموظفون</div><div class="kpi-value text-gold">${(d.employees||[]).length}</div></div>
      <div class="kpi-card"><div class="kpi-label">المعاملات</div><div class="kpi-value text-gold">${transactions.length}</div></div>
    </div>
    <div class="card">
      <div class="section-title mb-16">الإيرادات والمصروفات (آخر 6 أشهر)</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:200px;border-bottom:1px solid var(--border)">
        ${months.map(m=>{
          const inc=byMonth[m].income;
          const exp=byMonth[m].expense;
          const ih=Math.round((inc/maxVal)*160);
          const eh=Math.round((exp/maxVal)*160);
          return`<div style="flex:1;display:flex;gap:2px;align-items:flex-end;justify-content:center;flex-direction:column">
            <div style="display:flex;gap:2px;align-items:flex-end;width:100%">
              <div style="flex:1;height:${ih}px;background:var(--green);border-radius:4px 4px 0 0;min-height:2px" title="إيراد: ${fmt(inc)}"></div>
              <div style="flex:1;height:${eh}px;background:var(--red);border-radius:4px 4px 0 0;min-height:2px" title="مصروف: ${fmt(exp)}"></div>
            </div>
            <span style="font-size:10px;color:var(--text3);text-align:center;width:100%">${m.slice(5)}</span>
          </div>`;
        }).join('')||'<div class="empty-state"><p>لا توجد بيانات</p></div>'}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;justify-content:center">
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)"><span style="width:12px;height:12px;background:var(--green);border-radius:2px;display:inline-block"></span>إيرادات</span>
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)"><span style="width:12px;height:12px;background:var(--red);border-radius:2px;display:inline-block"></span>مصروفات</span>
      </div>
    </div>`;
}
