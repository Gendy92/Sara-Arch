<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://tvjkctttcijymqvaetsv.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.sheetjs.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; manifest-src 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3d2e22">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sara Arch">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>سارة أبو العلا — النظام المالي</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css?v=225">
</head>
<body>
<div id="app">
  <div class="splash-screen">
    <img src="logo.png" alt="Sara Abo Elelaa">
    <span>جاري تحميل النظام...</span>
  </div>
</div>

<script>
(function() {
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function showError(msg) {
    document.getElementById('app').innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;text-align:center;background:#3d2e22">' +
      '<div style="font-size:48px">⚠️</div>' +
      '<h2 style="color:#d4726e">حدث خطأ في التحميل</h2>' +
      '<p style="color:#6b6560;max-width:400px">' + escHtml(msg) + '</p>' +
      '<button onclick="location.reload(true)" style="padding:10px 24px;background:linear-gradient(135deg,#c4a97a,#d4bc94);color:#14161f;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600">إعادة المحاولة</button></div>';
  }

  function loadScript(src) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = function() { resolve(src); };
      s.onerror = function() { reject(src); };
      document.head.appendChild(s);
    });
  }

  function loadAll(version) {
    var oldVersion = localStorage.getItem('sara_app_version');
    localStorage.setItem('sara_app_version', version);
    // If a new version was just deployed, unregister the old service worker
    // and force a clean reload so the latest assets are always served.
    if (oldVersion && oldVersion !== String(version)) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        }).finally(function() {
          location.reload(true);
        });
      } else {
        location.reload(true);
      }
      return;
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=' + version).catch(function(err) {
        console.log('[SW] registration failed:', err);
      });
    }
    var cdnScripts = [
      'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'
    ];
    var localScripts = ['config.js','api.js','auth.js','ui.js','app-core.js','app-loaders.js','app-reports.js','crud.js'];

    // Load CDN scripts in parallel (no dependencies between them)
    var cdnPromise = Promise.all(cdnScripts.map(loadScript));

    // Optionally load local config overrides (gitignored) before config.js
    function loadOptionalLocalConfig() {
      return new Promise(function(resolve) {
        var s = document.createElement('script');
        s.src = 'js/config.local.js?v=' + version;
        s.onload = function() { resolve(); };
        s.onerror = function() { resolve(); }; // optional file; continue if missing
        document.head.appendChild(s);
      });
    }

    // Load local scripts sequentially (each depends on previous)
    var localPromise = cdnPromise.then(function() {
      return loadOptionalLocalConfig().then(function() {
        return localScripts.reduce(function(chain, file) {
          return chain.then(function() {
            return loadScript('js/' + file + '?v=' + version);
          });
        }, Promise.resolve());
      });
    });

    localPromise
      .then(function() {
        try { App.start(); }
        catch (e) { showError(e.message || 'Unknown error'); }
      })
      .catch(function(url) {
        showError('فشل تحميل: ' + url);
      });
  }

  // Always fetch version.json uncached to detect updates
  fetch('version.json?_=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) { loadAll(data.version); })
    .catch(function(err) {
      console.error('[Version] failed to fetch version.json:', err);
      // Fallback to hardcoded version if version.json unavailable
      loadAll('164');
    });
})();
</script>
</body>
</html>
