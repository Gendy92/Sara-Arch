<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>مكتب سارة أبو العلا - النظام المالي</title>
<link rel="stylesheet" href="css/style.css?v=24">
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#6b7591;font-family:'Segoe UI',Tahoma,Arial,sans-serif">
    <div style="width:60px;height:60px;border:3px solid #2a3045;border-top-color:#0d7377;border-radius:50%;animation:spin 1s linear infinite"></div>
    <span>جاري تحميل النظام...</span>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script src="js/config.js?v=24"></script>
<script src="js/api.js?v=24"></script>
<script src="js/auth.js?v=24"></script>
<script src="js/ui.js?v=24"></script>
<script src="js/app.js?v=24"></script>
<script>
try {
  App.start();
} catch (e) {
  document.getElementById('app').innerHTML =
    '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;text-align:center">' +
    '<div style="font-size:48px">⚠️</div>' +
    '<h2 style="color:#e53935">حدث خطأ في التحميل</h2>' +
    '<p style="color:#6b7591;max-width:400px">' + e.message + '</p>' +
    '<button onclick="location.reload()" style="padding:10px 24px;background:#0d7377;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit">إعادة المحاولة</button></div>';
}
</script>
</body>
</html>
