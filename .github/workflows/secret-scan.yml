name: Secret Scan

on:
  push:
    branches: [main, dev.2]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for common secret patterns
        run: |
          set -euo pipefail
          PATTERNS='gho_[A-Za-z0-9]{36,}|sk-[A-Za-z0-9]{48,}|service_role_[A-Za-z0-9]{40,}|eyJ[A-Za-z0-9_/+-]*.{0,2}eyJ[A-Za-z0-9_/+-]*'
          # Check all files in the working tree (excluding this workflow itself to avoid false positives)
          if git grep -nIP "$PATTERNS" -- . ':!.github/workflows/secret-scan.yml'; then
            echo "❌ Potential secret/token found. Remove it and rotate the credential."
            exit 1
          fi
          echo "✅ No obvious secrets detected."
