name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: |
          {
            echo "window.SARA_LOCAL_CONFIG = {"
            echo "  SUPABASE_URL: '${SUPABASE_URL:-https://tvjkctttcijymqvaetsv.supabase.co}',"
            echo "  SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}'"
            if [ -n "$STAGING_SUPABASE_URL" ] && [ -n "$STAGING_SUPABASE_ANON_KEY" ]; then
              echo "  ,STAGING_SUPABASE_URL: '${STAGING_SUPABASE_URL}',"
              echo "  STAGING_SUPABASE_ANON_KEY: '${STAGING_SUPABASE_ANON_KEY}'"
            fi
            echo "};"
          } > js/config.local.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Clean files not meant for deployment
        run: rm -f .env && rm -rf backups/ node_modules/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
